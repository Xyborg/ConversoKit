name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Lint
        run: pnpm lint

  release:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm release
          version: pnpm version-packages
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create umbrella GitHub release
        if: steps.changesets.outputs.published == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          set -e
          ver=$(node -p "require('./package.json').version")
          tag="v$ver"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists, skipping."
            exit 0
          fi
          notes=$(node scripts/aggregate-release-notes.js "$PUBLISHED_PACKAGES")
          gh release create "$tag" \
            --title "ConversoKit $tag" \
            --notes "$notes"

      - name: Verify published versions
        if: steps.changesets.outputs.published == 'true'
        run: |
          set -e
          fail=0
          for d in packages/*/; do
            name=$(node -p "require('./$d/package.json').name")
            want=$(node -p "require('./$d/package.json').version")
            got=$(npm view "$name" version 2>/dev/null || echo "MISSING")
            if [ "$want" = "$got" ]; then
              echo "✓ $name@$want"
            else
              echo "✗ $name: want $want, registry has $got"
              fail=1
            fi
          done
          exit $fail
